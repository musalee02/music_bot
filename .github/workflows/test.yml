name: Test & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8

    - name: Check Python syntax
      run: |
        python -m py_compile yt_music_bot.py
        python -m py_compile songs_download_bot.py
        python -m py_compile setup_spotify.py

    - name: Lint with flake8
      run: |
        # Cerca errori di sintassi critici
        flake8 *.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # Controlla lo stile (warnings, non errori)
        flake8 *.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics || true

    - name: Check imports
      run: |
        python -c "import yt_dlp; import requests; from telegram.ext import ApplicationBuilder; print('✓ All imports OK')"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install bandit

    - name: Run security check
      run: |
        bandit -r . --exclude ./venv -f csv || true
