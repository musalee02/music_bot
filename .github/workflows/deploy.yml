name: Deploy Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permette trigger manuale

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test bot initialization
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      run: python << 'EOF'
import sys
import os
from pathlib import Path

# Simula le variabili di ambiente
os.environ['TELEGRAM_TOKEN'] = os.getenv('TELEGRAM_TOKEN', '')
os.environ['SPOTIFY_CLIENT_ID'] = os.getenv('SPOTIFY_CLIENT_ID', '')
os.environ['SPOTIFY_CLIENT_SECRET'] = os.getenv('SPOTIFY_CLIENT_SECRET', '')

# Verifica che i moduli siano importabili
try:
    import yt_dlp
    import requests
    from telegram.ext import ApplicationBuilder
    print('✓ All required modules loaded successfully')
except ImportError as e:
    print(f'✗ Import error: {e}')
    sys.exit(1)
EOF

    - name: Notify on success
      if: success()
      run: echo "✓ Bot deployment check passed!"

    - name: Notify on failure
      if: failure()
      run: |
        echo "✗ Bot deployment check failed!"
        exit 1
