name: Deploy Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Test bot initialization
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      run: |
        python - << 'EOF'
        import os
        import sys
        from pathlib import Path

        # Verifica variabili di ambiente
        print(f"Checking environment...")
        t_token = os.getenv('TELEGRAM_TOKEN')
        s_id = os.getenv('SPOTIFY_CLIENT_ID')

        if not t_token or not s_id:
            print("✗ Missing critical secrets!")
            # Non usciamo con errore qui se vuoi solo testare gli import
        
        # Verifica che i moduli siano importabili
        try:
            import yt_dlp
            import requests
            from telegram.ext import ApplicationBuilder
            print('✓ All required modules loaded successfully')
        except ImportError as e:
            print(f'✗ Import error: {e}')
            sys.exit(1)
        EOF

    - name: Notify on success
      if: success()
      run: echo "✓ Bot deployment check passed!"

    - name: Notify on failure
      if: failure()
      run: echo "✗ Bot deployment check failed!"